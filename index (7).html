<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W2C — TRK Truck Brokerage Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700;800&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --canvas:#FFFFFF;--sidebar:#F8F9FB;--surface:#F2F3F5;--elevated:#E8EAED;--raised:#DDE0E4;
  --text-heading:#1A1D23;--text-body:#3B3F46;--text-secondary:#6B7280;--text-muted:#9CA3AF;
  --accent:#ea0029;--accent-dark:#c40022;--accent-bg:rgba(234,0,41,0.05);--accent-border:rgba(234,0,41,0.15);
  --red:#DC2626;--green:#16A34A;--blue:#2563EB;--teal:#0891B2;--purple:#7C3AED;--pink:#DB2777;--orange:#EA580C;
  --font-sans:'Source Sans 3','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
  --font-head:'Sora',var(--font-sans);
  --border:rgba(0,0,0,0.08);--border-hover:rgba(0,0,0,0.15);
  --row-h:36px;
}
html{font-size:13px;}
body{font-family:var(--font-sans);background:var(--canvas);color:var(--text-body);min-height:100vh;line-height:1.4;overflow:hidden;}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.12);}
::-webkit-scrollbar-track{background:transparent;}

/* ═══ TOPBAR ═══ */
.topbar{height:48px;background:#1A1D23;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:100;}
.topbar-brand{display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-weight:700;font-size:14px;color:#fff;letter-spacing:-0.3px;white-space:nowrap;}
.topbar-brand .sub{font-size:10px;font-weight:500;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.5px;margin-left:2px;}
.sep{width:1px;height:24px;background:rgba(255,255,255,0.1);flex-shrink:0;}
.tools{display:flex;align-items:center;gap:3px;flex:1;overflow-x:auto;}
.tools::-webkit-scrollbar{display:none;}
.tb{background:none;border:1px solid transparent;color:rgba(255,255,255,0.45);font-family:var(--font-sans);font-size:9.5px;font-weight:700;
  padding:5px 10px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:.3px;}
.tb:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.tb:active{background:rgba(255,255,255,0.12);transform:scale(0.96);}
.tb.active{background:rgba(234,0,41,0.12);border-color:rgba(234,0,41,0.25);color:#ff3355;}
.tb svg{width:13px;height:13px;flex-shrink:0;}
.tb-accent{background:linear-gradient(135deg,#ea0029,#c40022)!important;color:#fff!important;border:none!important;font-weight:800;padding:6px 14px;}
.tb-accent:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(234,0,41,0.3);}
.tb-accent:active{filter:brightness(0.9);transform:scale(0.96);box-shadow:none;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.lang-pill{display:flex;border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);}
.lang-pill button{background:none;border:none;color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;padding:3px 8px;cursor:pointer;transition:all .12s;font-family:var(--font-sans);}
.lang-pill button.active{background:rgba(234,0,41,0.15);color:#ff3355;}
.year-badge{font-size:10px;font-family:var(--font-head);font-weight:800;color:#ff3355;background:rgba(234,0,41,0.1);border:1px solid rgba(234,0,41,0.2);padding:3px 10px;border-radius:5px;}

/* ═══ SUBBAR (filters / stats) ═══ */
.subbar{height:38px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.subbar select,.subbar input{background:rgba(0,0,0,0.02);border:1px solid var(--border);color:var(--text-body);font-family:var(--font-sans);
  font-size:11px;padding:4px 8px;border-radius:4px;outline:none;transition:all .15s;}
.subbar select:focus,.subbar input:focus{border-color:var(--accent-border);background:var(--accent-bg);}
.subbar input{width:180px;}
.subbar input::placeholder{color:var(--text-muted);opacity:.5;}
.sub-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.sub-spacer{flex:1;}
.stat-pill{font-size:9px;font-family:var(--font-mono);font-weight:600;color:var(--text-muted);padding:3px 8px;border-radius:4px;background:rgba(0,0,0,0.02);border:1px solid var(--border);}
.stat-pill strong{font-weight:800;}
.stat-pill.accent strong{color:var(--accent);}
.stat-pill.green strong{color:var(--green);}
.stat-pill.red strong{color:var(--red);}
.sub-clear{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;cursor:pointer;display:none;transition:all .15s;}
.sub-clear.show{display:flex;align-items:center;gap:4px;}
.sub-clear:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.06);}
.sub-clear svg{width:10px;height:10px;}

/* ═══ MAIN LAYOUT ═══ */
.app{display:flex;flex-direction:column;height:100vh;}
.grid-area{flex:1;overflow:auto;position:relative;}

/* ═══ EXCEL GRID ═══ */
.v-table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:1600px;}
.v-table thead{position:sticky;top:0;z-index:10;}
.v-table th{background:var(--elevated);font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);
  padding:0 10px;height:30px;text-align:left;border-bottom:2px solid rgba(234,0,41,0.15);border-right:1px solid rgba(0,0,0,0.03);
  white-space:nowrap;user-select:none;position:relative;cursor:default;}
.v-table th:last-child{border-right:none;}
.v-table th.center{text-align:center;}
.v-table th .th-resize{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent;transition:background .12s;}
.v-table th .th-resize:hover{background:var(--accent);}

/* Column widths */
.col-drag{width:24px;}.col-ck{width:34px;}.col-num{width:100px;}.col-actions{width:60px;}.col-client{width:180px;}
.col-date{width:75px;}.col-orig{width:60px;}.col-dest{width:60px;}.col-carrier{width:120px;}
.col-cost{width:90px;}.col-sell{width:90px;}.col-notes{width:200px;}.col-ref{width:160px;}.col-status{width:130px;}

/* Drag handle */
.drag-handle{display:flex;align-items:center;justify-content:center;height:100%;cursor:grab;opacity:.2;transition:opacity .12s;color:var(--text-muted);}
.drag-handle:active{cursor:grabbing;}
.drag-handle:hover{opacity:.6;}
.drag-handle svg{width:12px;height:12px;}
.v-table tr.dragging{opacity:.35;background:var(--surface);}
.v-table tr.dragging td{border-color:transparent;}
.v-table tr.drag-over td{border-top:2px solid #ea0029;}

.v-table td{padding:0;border-bottom:1px solid rgba(0,0,0,0.04);border-right:1px solid rgba(0,0,0,0.04);
  height:var(--row-h);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.v-table td:last-child{border-right:none;}
.v-table tr:hover td{background:rgba(0,0,0,0.02);}
.v-table tr.selected td{background:var(--accent-bg);}

/* Cell types */
.cell-pad{padding:0 10px;font-size:11.5px;}
.cell-ck{display:flex;align-items:center;justify-content:center;height:100%;}
.cell-ck input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.cell-num{font-family:var(--font-head);font-size:11px;font-weight:700;color:#ea0029;padding:0 10px;cursor:pointer;transition:color .12s;}
.cell-num:hover{text-decoration:underline;color:#c40022;}
.cell-actions{display:flex;align-items:center;justify-content:center;gap:2px;height:100%;}
.cell-actions button{background:none;border:none;color:var(--text-muted);opacity:.45;cursor:pointer;width:22px;height:22px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0;}
.cell-actions button:hover{opacity:1;background:rgba(0,0,0,0.06);color:var(--accent);}
.cell-actions button svg{width:12px;height:12px;}

/* Agent avatar */
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;font-family:var(--font-head);color:#fff;letter-spacing:-.3px;margin:0 auto;}

/* Flag */
/* Editable cells */
.cell-edit{width:100%;height:100%;background:none;border:none;color:var(--text-body);font-family:var(--font-sans);font-size:11.5px;padding:0 10px;outline:none;}
.cell-edit:focus{background:var(--accent-bg);box-shadow:inset 0 0 0 1px var(--accent-border);}
.cell-edit.mono{font-family:var(--font-mono);font-size:10.5px;}
.cell-edit.right{text-align:right;}
.cell-edit.center{text-align:center;}

/* Add row */
.add-row{padding:8px 14px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--canvas);}
.add-row button{background:none;border:1px dashed var(--border);color:var(--text-muted);font-size:11px;font-weight:600;padding:6px 14px;border-radius:5px;
  cursor:pointer;transition:all .15s;font-family:var(--font-sans);width:100%;}
.add-row button:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg);}

/* ═══ B/L DETAIL PANEL (slide-out) ═══ */
.bol-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:500;display:none;backdrop-filter:blur(2px);}
.bol-overlay.open{display:block;}
.bol-panel{position:fixed;top:0;right:0;bottom:0;width:740px;max-width:90vw;background:var(--canvas);border-left:1px solid var(--border);
  z-index:501;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column;}
.bol-panel.open{transform:translateX(0);}
.bol-panel-hdr{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;flex-shrink:0;background:#1A1D23;}
.bol-panel-hdr h2{font-family:var(--font-head);font-size:14px;font-weight:700;color:#fff;flex:1;}
.bol-panel-hdr .bol-close{background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);width:28px;height:28px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.bol-panel-hdr .bol-close:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.1);}
.bol-panel-hdr .bol-close svg{width:14px;height:14px;}
.bol-scroll{flex:1;overflow-y:auto;padding:16px 18px;}

/* B/L form sections */
.bol-section{margin-bottom:14px;}
.bol-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bol-sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.bol-sec-title{font-family:var(--font-head);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-heading);}
.bol-sec-line{flex:1;height:1px;background:var(--border);}
.bol-grid{display:grid;gap:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;}
.bol-grid.c2{grid-template-columns:1fr 1fr;}
.bol-grid.c3{grid-template-columns:1fr 1fr 1fr;}
.bol-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.bol-grid.c6{grid-template-columns:repeat(6,1fr);}
.bf{display:flex;flex-direction:column;gap:2px;}
.bf.s2{grid-column:span 2;}
.bf.s3{grid-column:span 3;}
.bf label{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);line-height:1;}
.bf input,.bf select,.bf textarea{width:100%;padding:5px 7px;background:rgba(0,0,0,0.02);border:1px solid var(--border);
  border-radius:4px;color:var(--text-heading);font-family:var(--font-sans);font-size:11.5px;outline:none;transition:all .12s;}
.bf input:focus,.bf select:focus,.bf textarea:focus{border-color:var(--accent-border);background:var(--accent-bg);}
.bf textarea{resize:vertical;min-height:48px;font-size:11px;}

/* B/L commodity mini-grid */
.bol-commodity-grid{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-top:4px;}
.bol-c-table{width:100%;border-collapse:collapse;font-size:11px;}
.bol-c-table th{background:var(--elevated);font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-muted);padding:5px 6px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid rgba(0,0,0,0.02);}
.bol-c-table th:last-child{border-right:none;}
.bol-c-table td{padding:0;border-bottom:1px solid rgba(0,0,0,0.04);border-right:1px solid rgba(0,0,0,0.04);}
.bol-c-table td:last-child{border-right:none;}
.bol-c-table .bc-cell{width:100%;padding:4px 6px;background:none;border:none;color:var(--text-body);font-size:11px;font-family:var(--font-sans);outline:none;}
.bol-c-table .bc-cell:focus{background:var(--accent-bg);}
.bol-c-table .bc-cell.mono{font-family:var(--font-mono);font-size:10px;}
.bol-c-table .bc-cell.right{text-align:right;}
.bol-c-del{background:none;border:none;color:var(--text-muted);opacity:.35;cursor:pointer;padding:4px;transition:all .12s;}
.bol-c-del:hover{opacity:1;color:var(--red);}
.bol-c-del svg{width:11px;height:11px;}
.bol-c-add{width:100%;padding:5px;background:none;border:none;border-top:1px solid var(--border);color:var(--text-muted);font-size:10px;
  font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:all .12s;}
.bol-c-add:hover{background:var(--accent-bg);color:var(--accent);}
.bol-c-totals{display:flex;justify-content:flex-end;gap:14px;padding:7px 10px;border-top:2px solid var(--accent-border);background:var(--accent-bg);}
.bol-c-totals .ct-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.bol-c-totals .ct-lbl{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
.bol-c-totals .ct-val{font-size:13px;font-weight:800;font-family:var(--font-mono);color:var(--accent);}

/* B/L action footer */
.bol-footer{padding:10px 18px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:8px;flex-shrink:0;background:#1A1D23;}
.bol-btn{padding:7px 16px;border-radius:5px;font-family:var(--font-sans);font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.3px;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:5px;}
.bol-btn svg{width:12px;height:12px;}
.bol-btn-accent{background:linear-gradient(135deg,#ea0029,#c40022);color:#fff;}
.bol-btn-accent:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 3px 10px rgba(234,0,41,0.3);}
.bol-btn-ghost{background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);}
.bol-btn-ghost:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);color:#fff;}
.bol-btn-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ff5555;}
.bol-btn-red:hover{background:rgba(239,68,68,0.18);}

/* ═══ PRINT / BOL FORMAT ═══ */
.print-overlay{display:none;position:fixed;inset:0;z-index:9999;background:#fff;color:#000;overflow:auto;font-family:'Source Sans 3','Arial',sans-serif;font-size:10px;line-height:1.35;}
.print-overlay.show{display:block;}
.print-close{position:fixed;top:10px;right:10px;background:#111;color:#fff;border:none;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;z-index:10000;}
.bol-page{width:8in;margin:0 auto;padding:20px 24px;position:relative;}
.bol-title{text-align:center;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:0;}
.bol-page-num{position:absolute;top:20px;right:24px;font-size:9px;color:#555;}

/* Top grid: shipper left, refs+logo right */
.bol-top{display:grid;grid-template-columns:1fr 1fr;border:1px solid #000;border-top:none;}
.bol-top-left{border-right:1px solid #000;}
.bol-cell{padding:4px 8px;min-height:20px;}
.bol-cell-label{font-size:7px;color:#555;text-transform:capitalize;margin-bottom:1px;}
.bol-cell-val{font-size:11px;font-weight:700;color:#000;white-space:pre-line;}
.bol-cell-val-sm{font-size:10px;font-weight:400;color:#000;white-space:pre-line;}
.bol-ref-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #000;}
.bol-ref-cell{padding:3px 8px;border-right:1px solid #000;}
.bol-ref-cell:last-child{border-right:none;}
.bol-logo-area{padding:8px;display:flex;align-items:center;justify-content:center;min-height:60px;border-bottom:1px solid #000;}
.bol-logo-area svg{width:80px;height:46px;}

/* Middle: consignee + notify left, date+carrier+terms right */
.bol-mid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #000;border-top:none;}
.bol-mid-left{border-right:1px solid #000;}
.bol-mid-left .bol-cell{border-bottom:1px solid #000;}
.bol-mid-left .bol-cell:last-child{border-bottom:none;}
.bol-mid-right .bol-cell{border-bottom:1px solid #000;}
.bol-mid-right .bol-cell:last-child{border-bottom:none;}

/* Legal text */
.bol-legal{border:1px solid #000;border-top:none;padding:6px 8px;font-size:6.5px;line-height:1.3;color:#222;text-align:justify;}

/* Commodity table */
.bol-goods{border:1px solid #000;border-top:none;width:100%;border-collapse:collapse;}
.bol-goods th{font-size:7px;font-weight:700;text-align:left;padding:3px 6px;border-right:1px solid #000;border-bottom:1px solid #000;background:#f5f5f5;}
.bol-goods th:last-child{border-right:none;text-align:right;}
.bol-goods td{padding:4px 6px;border-right:1px solid #000;vertical-align:top;font-size:10px;}
.bol-goods td:last-child{border-right:none;text-align:right;}
.bol-goods .goods-body{min-height:120px;}

/* Bottom 3-col: declared val, notice of claim, detention */
.bol-bottom-3{display:grid;grid-template-columns:1fr 1.3fr 1fr;border:1px solid #000;border-top:none;}
.bol-bottom-3>div{padding:5px 7px;border-right:1px solid #000;font-size:6.5px;line-height:1.3;}
.bol-bottom-3>div:last-child{border-right:none;}
.bol-bottom-3 .bb-title{font-weight:800;font-size:8px;margin-bottom:3px;}

/* Remark */
.bol-remark{border:1px solid #000;border-top:none;padding:5px 8px;min-height:50px;}
.bol-remark-label{font-size:8px;font-style:italic;font-weight:700;margin-bottom:4px;}
.bol-remark-text{font-size:10px;white-space:pre-line;}

/* ═══ WHITEBOARD ═══ */
.wb-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:500;display:none;justify-content:center;align-items:center;}
.wb-overlay.open{display:flex;}
.wb-panel{width:90vw;height:85vh;max-width:1200px;background:var(--canvas);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.25);overflow:hidden;}
.wb-toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--sidebar);border-bottom:1px solid var(--border);}
.wb-tool{background:none;border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.wb-tool svg{width:16px;height:16px;}
.wb-tool:hover{background:rgba(0,0,0,0.04);border-color:var(--border-hover);color:var(--text-body);}
.wb-tool.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.wb-tool.wb-danger:hover{border-color:var(--red);color:var(--red);background:rgba(220,38,38,0.06);}
.wb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.wb-color{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;background:var(--canvas);}
.wb-size{border:1px solid var(--border);border-radius:6px;background:var(--canvas);color:var(--text-body);font-size:10px;font-weight:700;padding:4px 8px;height:32px;font-family:var(--font-sans);}
.wb-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fafafa;cursor:crosshair;}
.wb-canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.wb-notes{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.wb-note{position:absolute;width:180px;min-height:100px;background:#FFF9C4;border:1px solid #E6D85E;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1);padding:6px 8px;pointer-events:all;cursor:move;font-family:var(--font-sans);}
.wb-note-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.wb-note-head span{font-size:7px;font-weight:800;text-transform:uppercase;color:#8B7800;letter-spacing:.5px;}
.wb-note-del{background:none;border:none;color:#B8A000;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
.wb-note-del:hover{color:#ea0029;}
.wb-note textarea{width:100%;min-height:70px;background:none;border:none;resize:vertical;font-size:11px;font-family:var(--font-sans);color:#333;outline:none;line-height:1.4;}

/* CIFFA footer */
.bol-ciffa{border:1px solid #000;border-top:none;padding:4px 8px;font-size:6px;line-height:1.3;text-align:center;color:#333;}

/* Signatures */
.bol-sigs{display:grid;grid-template-columns:1.5fr .7fr 1.5fr .7fr 1.5fr .7fr;border:1px solid #000;border-top:none;}
.bol-sig-cell{padding:4px 8px;border-right:1px solid #000;min-height:28px;}
.bol-sig-cell:last-child{border-right:none;}
.bol-sig-label{font-size:7px;color:#555;}

@media print{
  .print-close{display:none;}
  body>*:not(.print-overlay){display:none !important;}
  .print-overlay{position:static;padding:0;}
  .bol-page{padding:10px 12px;width:100%;}
}

/* ═══ FOOTER ═══ */
.footer{height:30px;background:#1A1D23;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.footer span{font-size:9px;font-family:var(--font-mono);color:rgba(255,255,255,0.4);}
.footer strong{color:rgba(255,255,255,0.7);font-weight:700;}
</style>
</head>

<script>
(function(){
// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
var CARRIERS=['Freightcom','Elite Logix','Kwest Freight','Morneau','Trans-Plus','Labranche','DHL','FedEx','UPS','Purolator','Day & Ross','Manitoulin'];
var PORTS=[
  {code:'0406',name:'Lacolle, QC'},{code:'0482',name:'St-Bernard-de-Lacolle'},{code:'0609',name:'Fort Erie / Peace Bridge'},
  {code:'0615',name:'Queenston / Lewiston'},{code:'0605',name:'Windsor / Ambassador'},{code:'0607',name:'Sarnia / Blue Water'},
  {code:'0504',name:'Emerson, MB'},{code:'3501',name:'Douglas / Pacific Hwy'},{code:'0213',name:'Woodstock / Houlton'}
];

var lang='en';
var files=[];
var _fid=2114;
var _bolLines={};

// ═══════════════════════════════════════
//  LOAD / SAVE
// ═══════════════════════════════════════
function save(){try{localStorage.setItem('w2c_trk',JSON.stringify({v:10,files:files,fid:_fid,bolLines:_bolLines}));}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem('w2c_trk'));if(d&&d.v===6){files=d.files||[];_fid=d.fid||2114;_bolLines=d.bolLines||{};
  // Defensive: ensure every file has a bol object
  files.forEach(function(f){if(!f.bol)f.bol={shipName:'',shipAddr:'',shipCity:'',shipState:'',shipZip:'',shipCountry:'',conName:'',conAddr:'',conCity:'',conState:'',conZip:'',conCountry:'',carrName:'',carrScac:'',carrDriver:'',carrPlate:'',carrTrailer:'',carrSeal:'',carrPro:'',carrPickup:'',carrDelivery:'',carrFreight:'',port:'',incoterm:'',currency:'',pars:'',notesSpecial:'',notesCustoms:''};});
  }else{try{localStorage.removeItem('w2c_trk');}catch(e2){}}}catch(e){}}
load();

// Start empty
if(!files.length){ _fid=2114; }

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function L(en,fr){return lang==='fr'?fr:en;}
function fmtN(n,d){return Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:d,maximumFractionDigits:d});}
function getFile(id){for(var i=0;i<files.length;i++){if(files[i].id===id)return files[i];}return null;}
function shortDate(d){if(!d)return'';var p=d.split('-');var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var mFr=['janv','fevr','mars','avr','mai','juin','juil','aout','sept','oct','nov','dec'];
  var mi=parseInt(p[1])-1;return(lang==='fr'?mFr[mi]:months[mi])+'. '+parseInt(p[2]);}

// ═══════════════════════════════════════
//  LANGUAGE
// ═══════════════════════════════════════
document.getElementById('langPill').addEventListener('click',function(e){
  var btn=e.target.closest('button');if(!btn||btn.classList.contains('active'))return;
  this.querySelectorAll('button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');lang=btn.dataset.lang;
  document.querySelectorAll('[data-'+lang+']').forEach(function(el){
    if(el.tagName==='INPUT')el.placeholder=el.dataset[lang];
    else el.textContent=el.dataset[lang];
  });
  render();
});

// ═══════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════
var fSearch=document.getElementById('fSearch');

// ═══════════════════════════════════════
//  RENDER GRID
// ═══════════════════════════════════════
var gridBody=document.getElementById('gridBody');
var _searchTimer=null;

function getVisible(){
  var q=(fSearch.value||'').toLowerCase();
  return files.filter(function(f){
    if(q){
      var hay=(f.num+' '+f.client+' '+f.carrier+' '+f.notes+' '+f.ref+' '+f.orig+' '+f.dest+' '+f.status).toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }
    return true;
  });
}
function hasFilters(){return !!fSearch.value;}
function updateClear(){document.getElementById('filterClear').className='sub-clear'+(hasFilters()?' show':'');}

function render(){
  var vis=getVisible();
  updateClear();
  // Stats
  document.getElementById('statTotal').innerHTML='<strong>'+files.length+'</strong> '+L('files','dossiers');

  var h='';
  vis.forEach(function(f){
    h+='<tr data-id="'+f.id+'"'+(f.selected?' class="selected"':'')+'>';
    h+='<td><div class="drag-handle" draggable="true" data-id="'+f.id+'"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg></div></td>';
    h+='<td><div class="cell-ck"><input type="checkbox" class="row-ck" data-id="'+f.id+'"'+(f.selected?' checked':'')+'></div></td>';
    h+='<td><span class="cell-num" data-id="'+f.id+'">'+esc(f.num)+'</span></td>';
    h+='<td><div class="cell-actions">';
    h+='<button class="act-bol" data-id="'+f.id+'" title="'+L('Open B/L','Ouvrir B/L')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></button>';
    h+='<button class="act-dup" data-id="'+f.id+'" title="'+L('Duplicate','Dupliquer')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>';
    h+='</div></td>';
    h+='<td><input class="cell-edit" data-id="'+f.id+'" data-field="client" value="'+esc(f.client)+'"></td>';
    h+='<td class="cell-pad" style="font-size:10.5px;color:var(--text-secondary)">'+shortDate(f.date)+'</td>';
    h+='<td><input class="cell-edit center" data-id="'+f.id+'" data-field="orig" value="'+esc(f.orig)+'" style="text-transform:uppercase"></td>';
    h+='<td><input class="cell-edit center" data-id="'+f.id+'" data-field="dest" value="'+esc(f.dest)+'" style="text-transform:uppercase"></td>';
    h+='<td><input class="cell-edit" data-id="'+f.id+'" data-field="carrier" value="'+esc(f.carrier)+'"></td>';
    h+='<td><input class="cell-edit mono right" data-id="'+f.id+'" data-field="cost" value="'+(f.cost||'')+'"></td>';
    h+='<td><input class="cell-edit mono right" data-id="'+f.id+'" data-field="sell" value="'+(f.sell||'')+'"></td>';

//  DRAG & DROP REORDER
// ═══════════════════════════════════════
var _dragId=null;
gridBody.addEventListener('dragstart',function(e){
  var handle=e.target.closest('.drag-handle');if(!handle){e.preventDefault();return;}
  var tr=handle.closest('tr');if(!tr)return;
  _dragId=parseInt(tr.dataset.id);
  tr.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragId);
});
gridBody.addEventListener('dragend',function(e){
  gridBody.querySelectorAll('.dragging').forEach(function(r){r.classList.remove('dragging');});
  gridBody.querySelectorAll('.drag-over').forEach(function(r){r.classList.remove('drag-over');});
  _dragId=null;
});
gridBody.addEventListener('dragover',function(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  var tr=e.target.closest('tr');if(!tr||parseInt(tr.dataset.id)===_dragId)return;
  gridBody.querySelectorAll('.drag-over').forEach(function(r){r.classList.remove('drag-over');});
  tr.classList.add('drag-over');
});
gridBody.addEventListener('dragleave',function(e){
  var tr=e.target.closest('tr');if(tr)tr.classList.remove('drag-over');
});
gridBody.addEventListener('drop',function(e){
  e.preventDefault();
  gridBody.querySelectorAll('.drag-over').forEach(function(r){r.classList.remove('drag-over');});
  var tr=e.target.closest('tr');if(!tr||_dragId===null)return;
  var dropId=parseInt(tr.dataset.id);if(dropId===_dragId)return;
  var fromIdx=-1,toIdx=-1;
  for(var i=0;i<files.length;i++){
    if(files[i].id===_dragId)fromIdx=i;
    if(files[i].id===dropId)toIdx=i;
  }
  if(fromIdx<0||toIdx<0)return;
  var item=files.splice(fromIdx,1)[0];
  files.splice(toIdx,0,item);
  _dragId=null;save();render();
});

function duplicateFile(id){

  return h;

function wireBolLines(fileId){
  var tbody=document.getElementById('bolCLines');
  if(!tbody)return;
  tbody.addEventListener('input',function(e){
    var el=e.target;if(!el.dataset.f)return;
    var tr=el.closest('tr');var idx=parseInt(tr.dataset.idx);
    var lines=_bolLines[fileId];if(lines&&lines[idx])lines[idx][el.dataset.f]=el.value;
    updateBolTotals(fileId);
  });
  tbody.addEventListener('click',function(e){
    var del=e.target.closest('.bol-c-del');if(!del)return;
    var idx=parseInt(del.dataset.idx);
    var lines=_bolLines[fileId];if(lines&&lines.length>1){lines.splice(idx,1);rerenderBolLines(fileId);}
  });
  var addBtn=document.getElementById('bolAddLine');
  if(addBtn)addBtn.addEventListener('click',function(){
    var lines=_bolLines[fileId]||[];
    lines.push({desc:'',hs:'',pcs:'',pkg:'Pallets',grossWt:'',netWt:'',value:'',origin:'US'});
    _bolLines[fileId]=lines;
    rerenderBolLines(fileId);
  });
}

function rerenderBolLines(fileId){
  var tbody=document.getElementById('bolCLines');if(!tbody)return;
  var lines=_bolLines[fileId]||[];
  var h='';lines.forEach(function(ln,i){h+=bolLineRow(ln,i);});
  tbody.innerHTML=h;
  updateBolTotals(fileId);
}

function updateBolTotals(fileId){
  var el=document.getElementById('bolCTotals');if(!el)return;
  var lines=_bolLines[fileId]||[];
  var pcs=0,gw=0,nw=0,val=0;
  lines.forEach(function(ln){pcs+=parseFloat(ln.pcs)||0;gw+=parseFloat(ln.grossWt)||0;nw+=parseFloat(ln.netWt)||0;val+=parseFloat(ln.value)||0;});
  el.innerHTML='<div class="ct-item"><span class="ct-lbl">'+L('Pieces','Colis')+'</span><span class="ct-val">'+fmtN(pcs,0)+'</span></div>'+
    '<div class="ct-item"><span class="ct-lbl">'+L('Gross','Brut')+'</span><span class="ct-val">'+fmtN(gw,2)+' kg</span></div>'+
    '<div class="ct-item"><span class="ct-lbl">'+L('Net','Net')+'</span><span class="ct-val">'+fmtN(nw,2)+' kg</span></div>'+
    '<div class="ct-item"><span class="ct-lbl">'+L('Value','Valeur')+'</span><span class="ct-val">'+fmtN(val,2)+'</span></div>';
}

function printBol(fileId){
  var f=getFile(fileId);if(!f)return;
  var b=f.bol;
  var lines=_bolLines[fileId]||[];
  var pcs=0,gw=0,nw=0,val=0;
  lines.forEach(function(ln){pcs+=parseFloat(ln.pcs)||0;gw+=parseFloat(ln.grossWt)||0;nw+=parseFloat(ln.netWt)||0;val+=parseFloat(ln.value)||0;});

document.getElementById('tbPrint').addEventListener('click',function(){
  var sel=files.filter(function(f){return f.selected;});
  if(sel.length===1)printBol(sel[0].id);
  else if(_bolFileId)printBol(_bolFileId);
  else alert(L('Select a file first or open a B/L','S\u00e9lectionnez un dossier ou ouvrez un B/L'));

document.getElementById('tbExport').addEventListener('click',function(){
  if(!files.length){alert(L('No files to export','Aucun dossier \u00e0 exporter'));return;}
  var header=lang==='fr'?['Dossier #','Client','Date','Orig.','Dest.','Transporteur','Co\u00fbt','Vente','Notes','R\u00e9f.','Statut']:['File #','Client','Date','Origin','Dest','Carrier','Cost','Sell','Notes','Ref','Status'];
  var csvRows=[header.join(',')];
  files.forEach(function(f){
    csvRows.push([f.num,'"'+f.client+'"',f.date,f.orig,f.dest,'"'+f.carrier+'"',f.cost,f.sell,'"'+f.notes+'"','"'+f.ref+'"','"'+f.status+'"'].join(','));
  });
  var blob=new Blob([csvRows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='W2C_TRK_Export.csv';a.click();
});

// ═══════════════════════════════════════
//  WHITEBOARD
// ═══════════════════════════════════════
var wbOverlay=document.getElementById('wbOverlay');
var wbPanel=document.getElementById('wbPanel');
var wbCanvas=document.getElementById('wbCanvas');
var wbCtx=wbCanvas.getContext('2d');
var _wbTool='pen',_wbDrawing=false,_wbHistory=[],_wbNotes=[];
var _wbNoteId=0;

function wbResize(){
  var wrap=document.getElementById('wbCanvasWrap');
  var w=wrap.clientWidth,h=wrap.clientHeight;
  // Save current image
  var imgData=null;
  if(wbCanvas.width>0&&wbCanvas.height>0){try{imgData=wbCtx.getImageData(0,0,wbCanvas.width,wbCanvas.height);}catch(e){}}
  wbCanvas.width=w;wbCanvas.height=h;
  if(imgData)wbCtx.putImageData(imgData,0,0);
}

function openWhiteboard(){
  wbOverlay.classList.add('open');
  setTimeout(function(){wbResize();wbRedraw();},50);
}
function closeWhiteboard(){wbOverlay.classList.remove('open');wbSaveState();}

document.getElementById('tbWhiteboard').addEventListener('click',openWhiteboard);
document.getElementById('wbClose').addEventListener('click',closeWhiteboard);
wbOverlay.addEventListener('click',function(e){if(e.target===wbOverlay)closeWhiteboard();});

// Tool selection
document.getElementById('wbToolbar').addEventListener('click',function(e){
  var btn=e.target.closest('[data-tool]');
  if(btn){
    document.querySelectorAll('.wb-tool[data-tool]').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');_wbTool=btn.dataset.tool;
  }
});

// Drawing
wbCanvas.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  _wbDrawing=true;
  var r=wbCanvas.getBoundingClientRect();
  var x=e.clientX-r.left,y=e.clientY-r.top;
  wbCtx.beginPath();wbCtx.moveTo(x,y);
  if(_wbTool==='eraser'){
    wbCtx.globalCompositeOperation='destination-out';
    wbCtx.lineWidth=parseInt(document.getElementById('wbSize').value)*5;
  } else {
    wbCtx.globalCompositeOperation='source-over';
    wbCtx.strokeStyle=document.getElementById('wbColor').value;
    wbCtx.lineWidth=parseInt(document.getElementById('wbSize').value);
  }
  wbCtx.lineCap='round';wbCtx.lineJoin='round';
});
wbCanvas.addEventListener('mousemove',function(e){
  if(!_wbDrawing)return;
  var r=wbCanvas.getBoundingClientRect();
  wbCtx.lineTo(e.clientX-r.left,e.clientY-r.top);
  wbCtx.stroke();
});
wbCanvas.addEventListener('mouseup',function(){
  if(_wbDrawing){_wbDrawing=false;wbCtx.globalCompositeOperation='source-over';wbSnapshot();}
});
wbCanvas.addEventListener('mouseleave',function(){
  if(_wbDrawing){_wbDrawing=false;wbCtx.globalCompositeOperation='source-over';wbSnapshot();}
});

// Touch support
wbCanvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];wbCanvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
wbCanvas.addEventListener('touchmove',function(e){e.preventDefault();var t=e.touches[0];wbCanvas.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
wbCanvas.addEventListener('touchend',function(e){e.preventDefault();wbCanvas.dispatchEvent(new MouseEvent('mouseup'));},{passive:false});

function wbSnapshot(){
  try{_wbHistory.push(wbCanvas.toDataURL());}catch(e){}
  if(_wbHistory.length>30)_wbHistory.shift();
}
function wbRedraw(){
  if(_wbHistory.length>0){
    var img=new Image();img.onload=function(){wbCtx.clearRect(0,0,wbCanvas.width,wbCanvas.height);wbCtx.drawImage(img,0,0);};
    img.src=_wbHistory[_wbHistory.length-1];
  }
}

// Undo
document.getElementById('wbUndo').addEventListener('click',function(){
  if(_wbHistory.length>0){_wbHistory.pop();
    wbCtx.clearRect(0,0,wbCanvas.width,wbCanvas.height);
    if(_wbHistory.length>0){var img=new Image();img.onload=function(){wbCtx.drawImage(img,0,0);};img.src=_wbHistory[_wbHistory.length-1];}
  }
});

// Clear
document.getElementById('wbClear').addEventListener('click',function(){
  if(!confirm(L('Clear whiteboard?','Effacer le tableau blanc ?')))return;
  wbCtx.clearRect(0,0,wbCanvas.width,wbCanvas.height);
  _wbHistory=[];
  document.getElementById('wbNotes').innerHTML='';_wbNotes=[];
  wbSaveState();
});

// Sticky notes
document.getElementById('wbAddNote').addEventListener('click',function(){
  var n={id:++_wbNoteId,x:40+Math.random()*200,y:40+Math.random()*150,text:'',color:'#FFF9C4'};
  _wbNotes.push(n);
  renderWbNote(n);
});

function renderWbNote(n){
  var div=document.createElement('div');div.className='wb-note';div.dataset.id=n.id;
  div.style.left=n.x+'px';div.style.top=n.y+'px';div.style.background=n.color;
  div.innerHTML='<div class="wb-note-head"><span>'+L('NOTE','NOTE')+'</span><button class="wb-note-del" data-id="'+n.id+'">&times;</button></div><textarea placeholder="'+L('Type here...','Ecrire ici...')+'">'+esc(n.text)+'</textarea>';
  // Drag
  var hdr=div.querySelector('.wb-note-head');
  var ox=0,oy=0,dragging=false;
  hdr.addEventListener('mousedown',function(e){dragging=true;ox=e.offsetX;oy=e.offsetY;e.preventDefault();});
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var wrap=document.getElementById('wbCanvasWrap').getBoundingClientRect();
    div.style.left=Math.max(0,e.clientX-wrap.left-ox)+'px';
    div.style.top=Math.max(0,e.clientY-wrap.top-oy)+'px';
  });
  document.addEventListener('mouseup',function(){if(dragging){dragging=false;syncWbNote(n.id,div);}});
  // Delete
  div.querySelector('.wb-note-del').addEventListener('click',function(){
    _wbNotes=_wbNotes.filter(function(nn){return nn.id!==n.id;});
    div.remove();wbSaveState();
  });
  // Text change
  div.querySelector('textarea').addEventListener('input',function(){syncWbNote(n.id,div);});
  document.getElementById('wbNotes').appendChild(div);
}

function syncWbNote(id,div){
  for(var i=0;i<_wbNotes.length;i++){
    if(_wbNotes[i].id===id){
      _wbNotes[i].x=parseInt(div.style.left)||0;
      _wbNotes[i].y=parseInt(div.style.top)||0;
      _wbNotes[i].text=div.querySelector('textarea').value;break;
    }
  }
  wbSaveState();
}

// Persist whiteboard
function wbSaveState(){
  try{localStorage.setItem('w2c_trk_wb',JSON.stringify({canvas:_wbHistory.length?_wbHistory[_wbHistory.length-1]:'',notes:_wbNotes,noteId:_wbNoteId}));}catch(e){}
}
function wbLoadState(){
  try{
    var d=JSON.parse(localStorage.getItem('w2c_trk_wb'));
    if(d){
      if(d.canvas){_wbHistory=[d.canvas];}
      if(d.notes){_wbNotes=d.notes;_wbNoteId=d.noteId||0;
        _wbNotes.forEach(function(n){renderWbNote(n);});
      }
    }
  }catch(e){}
}
wbLoadState();
window.addEventListener('resize',function(){if(wbOverlay.classList.contains('open'))wbResize();});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
render();

})();
